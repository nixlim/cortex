###############################################################################
# Cortex neo4j.conf overlay.
#
# This file is merged into the Neo4j runtime configuration on top of the
# upstream defaults. Most tunables (heap, page cache, listen address, GDS
# allowlist, credentials) are set via NEO4J_* environment variables in
# docker-compose.yaml so operators can override them without rebuilding the
# image. This file only carries settings that are awkward to express as
# environment variables or that must be present before the env-var merge
# runs.
#
# Spec references:
#   docs/spec/cortex-spec.md §"Custom Neo4j + GDS Image"
#   docs/spec/cortex-spec.md §"Resource Allocation"
###############################################################################

# Enable the GDS procedure allowlist. The NEO4J_dbms_security_procedures_*
# environment variables in docker-compose.yaml express the same setting;
# we duplicate them here so a standalone `docker run` of the image (e.g.,
# during CI acceptance tests) still boots with GDS callable.
dbms.security.procedures.unrestricted=gds.*
dbms.security.procedures.allowlist=gds.*

# Listen on all interfaces inside the container. Loopback-only exposure is
# enforced by the `127.0.0.1:...` port bindings on the host side.
server.default_listen_address=0.0.0.0

# Accept the community edition license. This keeps the image boot path
# non-interactive.
dbms.security.auth_enabled=true
