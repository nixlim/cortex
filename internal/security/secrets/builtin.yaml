# Built-in secret detector ruleset for Cortex Phase 1.
#
# Each rule has:
#   name:     unique identifier surfaced in error envelopes
#   regex:    Go regexp/RE2 pattern (anchored where appropriate)
#   entropy:  optional Shannon entropy floor for matches whose shape alone
#             is insufficient (generic high-entropy rules)
#   severity: info | warn | high
#
# Rule names in this file are reserved and cannot be redefined by operator
# extension files.

rules:
  - name: aws_access_key
    regex: 'AKIA[0-9A-Z]{16}'
    severity: high

  - name: aws_secret_key_hint
    regex: '(?i)aws(.{0,20})?(secret|sk)[^A-Za-z0-9]{1,3}[A-Za-z0-9/+=]{40}'
    severity: high

  - name: github_pat
    regex: 'gh[pousr]_[A-Za-z0-9]{36,}'
    severity: high

  - name: gitlab_pat
    regex: 'glpat-[A-Za-z0-9\-_]{20,}'
    severity: high

  - name: slack_token
    regex: 'xox[baprs]-[A-Za-z0-9\-]{10,}'
    severity: high

  - name: discord_bot_token
    regex: '[MN][A-Za-z\d]{23}\.[\w-]{6}\.[\w-]{27}'
    severity: high

  - name: private_key_pem
    regex: '-----BEGIN (RSA|EC|OPENSSH|PGP|DSA) PRIVATE KEY-----'
    severity: high

  - name: jwt
    regex: 'eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'
    severity: warn

  - name: generic_high_entropy_secret
    regex: '(?i)(password|secret|token|api[_-]?key)[^A-Za-z0-9]{1,5}[A-Za-z0-9/+=]{20,}'
    entropy: 4.5
    severity: warn
